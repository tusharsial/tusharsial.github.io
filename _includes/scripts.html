<!-- Patch greedy nav BEFORE it loads -->
<script>
(function(){
  // Override the greedy nav collapse by patching it after main.min.js runs
  // We intercept by replacing the resize/init logic after DOM is ready
  function forceShowAll() {
    var visibleLinks = document.querySelector('.greedy-nav .visible-links');
    var hiddenLinks  = document.querySelector('.greedy-nav .hidden-links');
    if (!visibleLinks || !hiddenLinks) return false;
    var moved = false;
    while (hiddenLinks.children.length > 0) {
      visibleLinks.appendChild(hiddenLinks.children[0]);
      moved = true;
    }
    var toggle = document.querySelector('.greedy-nav__toggle');
    if (toggle) toggle.style.display = 'none';
    return moved;
  }

  // Poll aggressively until stable
  var attempts = 0;
  var interval = setInterval(function() {
    forceShowAll();
    attempts++;
    if (attempts > 40) clearInterval(interval);
  }, 50);

  // Also on every resize to prevent re-collapse
  window.addEventListener('resize', forceShowAll);
})();
</script>

<!-- Fade-in on scroll -->
<script>
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.15 });
document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));
</script>

<!-- Smart Navbar -->
<script>
(function () {
  const nav = document.querySelector('.masthead');
  if (!nav) return;
  let lastY = window.scrollY;
  let ticking = false;
  let delta = 0;
  const hideThreshold = 120;
  const showThreshold = 5;
  const scrollDelta = 12;
  nav.classList.add('nav-visible');
  window.addEventListener('scroll', function () {
    if (ticking) return;
    window.requestAnimationFrame(function () {
      const currentY = window.scrollY;
      const diff = currentY - lastY;
      delta += diff;
      if (currentY <= showThreshold) {
        nav.classList.remove('nav-hidden');
        nav.classList.add('nav-visible');
        delta = 0;
      } else if (delta > scrollDelta && currentY > hideThreshold) {
        nav.classList.remove('nav-visible');
        nav.classList.add('nav-hidden');
        delta = 0;
      } else if (delta < -scrollDelta) {
        nav.classList.remove('nav-hidden');
        nav.classList.add('nav-visible');
        delta = 0;
      }
      lastY = currentY;
      ticking = false;
    });
    ticking = true;
  }, { passive: true });
})();
</script>
