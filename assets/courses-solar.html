<script>
const C=[
  {code:'MATH F112',name:'Linear & Complex Algebra',cat:'Applied Mathematics',inst:'BITS Pilani · UG',col:0x29B6F6,desc:'Vector spaces, eigenvalue problems, complex analysis, and engineering applications.'},

const CAT_CSS={'Applied Mathematics':'#29B6F6','Controls & Estimation':'#4CAF50','Astrodynamics':'#FF6600','Systems & Design':'#FFCC44','Formal Methods':'#FF8800','Robotics':'#AB47BC','Signal Processing':'#26C6DA','Electronics':'#EC407A'};

const canvas=document.getElementById('cv');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x03030a,1);
let W=canvas.clientWidth,H=canvas.clientHeight;
renderer.setSize(W,H,false);
window.addEventListener('resize',()=>{
  W=canvas.clientWidth;H=canvas.clientHeight;
  renderer.setSize(W,H,false);
  cam.aspect=W/H;cam.updateProjectionMatrix();
});

// ── ORBIT CONTROLS ──
function mkCtrl(cam,el,initPhi,initTheta,initR){
  let phi=initPhi,theta=initTheta,r=initR,target=new THREE.Vector3();
  let tPhi=phi,tTheta=theta,tR=r,tTarget=target.clone();
  let drag=false,px=0,py=0,vT=0,vP=0;
  el.addEventListener('mousedown',e=>{drag=true;px=e.clientX;py=e.clientY;vT=vP=0;});
  window.addEventListener('mouseup',()=>drag=false);
  window.addEventListener('mousemove',e=>{if(!drag)return;const dx=(e.clientX-px)*0.007,dy=(e.clientY-py)*0.007;vT=dx;vP=dy;tTheta+=dx;tPhi=Math.max(0.05,Math.min(Math.PI-0.05,tPhi+dy));px=e.clientX;py=e.clientY;});
  el.addEventListener('wheel',e=>{
    e.preventDefault();
    // Only allow zoom in default (unfocused) state
    if(focusPlanet||focusMoon)return;
    tR=Math.max(6,Math.min(140,tR+e.deltaY*0.055));
  },{passive:false});
  return{
    update(){
      if(!drag){tTheta+=vT*0.93;tPhi+=vP*0.93;vT*=0.93;vP*=0.93;}
      phi+=(tPhi-phi)*0.09;theta+=(tTheta-theta)*0.09;r+=(tR-r)*0.09;
      target.lerp(tTarget,0.12);
      cam.position.set(target.x+r*Math.sin(phi)*Math.sin(theta),target.y+r*Math.cos(phi),target.z+r*Math.sin(phi)*Math.cos(theta));
      cam.lookAt(target);
    },
    flyTo(nr,np,nt,dur=1.2,ntarget=null){
      const obj={r,phi,theta,tx:tTarget.x,ty:tTarget.y,tz:tTarget.z};
      gsap.to(obj,{r:nr,phi:np,theta:nt,tx:ntarget?ntarget.x:tTarget.x,ty:ntarget?ntarget.y:tTarget.y,tz:ntarget?ntarget.z:tTarget.z,duration:dur,ease:'power3.inOut',onUpdate:()=>{r=obj.r;phi=obj.phi;theta=obj.theta;tR=r;tPhi=phi;tTheta=theta;tTarget.set(obj.tx,obj.ty,obj.tz);}});
    },
    reset(dur=1.0){this.flyTo(initR,initPhi,initTheta,dur,new THREE.Vector3());},
    setTarget(v){tTarget.copy(v);},
    getR(){return r;}
  };
}

function mkStars(n=2800,rMin=100,rMax=320){
  const pos=new Float32Array(n*3),col=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const r=rMin+Math.random()*(rMax-rMin),th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(ph)*Math.cos(th);pos[i*3+1]=r*Math.sin(ph)*Math.sin(th);pos[i*3+2]=r*Math.cos(ph);
    const t=Math.random();col[i*3]=0.55+t*0.45;col[i*3+1]=0.6+t*0.35;col[i*3+2]=0.8+t*0.2;
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  return new THREE.Points(geo,new THREE.PointsMaterial({size:0.28,vertexColors:true,transparent:true,opacity:0.72}));
}

const _dustTex=(()=>{
  const c=document.createElement('canvas');c.width=c.height=32;
  const ctx=c.getContext('2d');
  const g=ctx.createRadialGradient(16,16,0,16,16,16);
  g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.4,'rgba(255,255,255,0.8)');g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,32,32);
  return new THREE.CanvasTexture(c);
})();

function mkOrbitingDust(n,rMin,rMax,colorBias=[0.08,0.25,0.72],yScale=0.18){
  const pos=new Float32Array(n*3),particles=[];
  for(let i=0;i<n;i++)particles.push({r:rMin+Math.pow(Math.random(),0.6)*(rMax-rMin),inc:(Math.random()-0.5)*yScale,anomaly:Math.random()*Math.PI*2,speed:(0.00018+Math.random()*0.00025)*(Math.random()<0.5?1:-1)});
  const geo=new THREE.BufferGeometry();
  const attr=new THREE.BufferAttribute(pos,3);attr.setUsage(THREE.DynamicDrawUsage);geo.setAttribute('position',attr);
  const tc=colorBias;
  const mesh=new THREE.Points(geo,new THREE.PointsMaterial({color:new THREE.Color(tc[0]+0.06,tc[1]+0.15,tc[2]+0.04),size:0.38,transparent:true,opacity:0.55,sizeAttenuation:true,map:_dustTex,alphaMap:_dustTex,alphaTest:0.01,depthWrite:false}));
  return{mesh,update(){for(let i=0;i<n;i++){const p=particles[i];p.anomaly+=p.speed;pos[i*3]=p.r*Math.cos(p.anomaly);pos[i*3+1]=p.r*Math.sin(p.anomaly)*Math.sin(p.inc);pos[i*3+2]=p.r*Math.sin(p.anomaly)*Math.cos(p.inc);}attr.needsUpdate=true;}};
}

function mkGaussBelt(n,rMid,sigma,rMin,rMax,yScale){
  const pos=new Float32Array(n*3),particles=[];
  for(let i=0;i<n;i++){const u=1-Math.random(),v=Math.random();const g=Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);particles.push({r:Math.max(rMin,Math.min(rMax,rMid+g*sigma)),inc:(Math.random()-0.5)*yScale,anomaly:Math.random()*Math.PI*2,speed:(0.00009+Math.random()*0.00012)*(Math.random()<0.5?1:-1)});}
  const geo=new THREE.BufferGeometry();
  const attr=new THREE.BufferAttribute(pos,3);attr.setUsage(THREE.DynamicDrawUsage);geo.setAttribute('position',attr);
  const mesh=new THREE.Points(geo,new THREE.PointsMaterial({color:new THREE.Color(0.14,0.40,0.76),size:0.36,transparent:true,opacity:0.60,sizeAttenuation:true,map:_dustTex,alphaMap:_dustTex,alphaTest:0.01,depthWrite:false}));
  return{mesh,update(){for(let i=0;i<n;i++){const p=particles[i];p.anomaly+=p.speed;pos[i*3]=p.r*Math.cos(p.anomaly);pos[i*3+1]=p.r*Math.sin(p.anomaly)*Math.sin(p.inc);pos[i*3+2]=p.r*Math.sin(p.anomaly)*Math.cos(p.inc);}attr.needsUpdate=true;}};
}

function buildGradientSphere(radius,seg=40){
  const geo=new THREE.SphereGeometry(radius,seg,seg);
  const c=new Float32Array(geo.attributes.position.count*3);
  for(let i=0;i<geo.attributes.position.count;i++){
    const x=geo.attributes.position.getX(i)/radius,y=geo.attributes.position.getY(i)/radius,z=geo.attributes.position.getZ(i)/radius;
    const h=(y+1)*0.5,swirl=0.12*Math.sin(7*x+5*z)+0.07*Math.cos(11*y+3*x),t=Math.max(0,Math.min(1,h+swirl));
    c[i*3]=1.0;c[i*3+1]=0.18+t*0.68;c[i*3+2]=0.02+t*0.34;
  }
  geo.setAttribute('color',new THREE.BufferAttribute(c,3));
  return new THREE.Mesh(geo,new THREE.MeshBasicMaterial({vertexColors:true}));
}

const DEPTS=[

function tiltedOrbitPoint(r,inc,a){return new THREE.Vector3(r*Math.cos(a),r*Math.sin(a)*Math.sin(inc),r*Math.sin(a)*Math.cos(inc));}

DEPTS.forEach((dept,di)=>{
  const orbitMat=new THREE.LineBasicMaterial({color:dept.col,transparent:true,opacity:0.17});
  const orbitPts=[];for(let k=0;k<=256;k++)orbitPts.push(tiltedOrbitPoint(dept.r,dept.inc,(k/256)*Math.PI*2));
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(orbitPts),orbitMat));
  const planet=new THREE.Mesh(new THREE.SphereGeometry(dept.ps,28,28),new THREE.MeshPhongMaterial({color:dept.dark,emissive:dept.col,emissiveIntensity:0.14,shininess:24}));
  planet.add(new THREE.Mesh(new THREE.SphereGeometry(dept.ps*1.24,20,20),new THREE.MeshBasicMaterial({color:dept.col,transparent:true,opacity:0.055,side:THREE.BackSide,depthWrite:false})));
  scene.add(planet);
  const pObj={planet,orbitMat,inc:dept.inc,r:dept.r,anomaly:di*(Math.PI*2/DEPTS.length),speed:dept.speed,dept};
  pObj.placePlanet=function(){planet.position.copy(tiltedOrbitPoint(pObj.r,pObj.inc,pObj.anomaly));};
  pObj.placePlanet();planetObjs.push(pObj);allPicks.push(planet);
  planetMap.set(planet,{code:'',name:dept.name,cat:'Course Group',inst:'',desc:`${dept.name} — click a moon to explore individual courses.`});
  const dCourses=grps[dept.cat]||[];
  dCourses.forEach((course,mi)=>{
    const moonR=dept.ps*2.8+mi*1.55,moonIncl=((mi%3)-1)*0.18;
    const moon=new THREE.Mesh(new THREE.SphereGeometry(0.28,14,14),new THREE.MeshPhongMaterial({color:dept.col,emissive:dept.col,emissiveIntensity:0.42,shininess:60}));
    moon.add(new THREE.Mesh(new THREE.SphereGeometry(0.5,8,8),new THREE.MeshBasicMaterial({color:dept.col,transparent:true,opacity:0.07,side:THREE.BackSide,depthWrite:false})));
    scene.add(moon);
    const moonRing=new THREE.Line(new THREE.BufferGeometry(),new THREE.LineBasicMaterial({color:dept.col,transparent:true,opacity:0.21}));
    scene.add(moonRing);
    moonObjs.push({moon,planetObj:pObj,moonRing,mMat:moon.material,moonR,moonIncl,anomaly:mi*(Math.PI*2/Math.max(dCourses.length,1)),speed:0.0028-mi*0.0005,phase:Math.random()*Math.PI*2,course});
    allPicks.push(moon);moonMap.set(moon,course);
  });
});

function updateMoonWorld(m){const local=tiltedOrbitPoint(m.moonR,m.moonIncl,m.anomaly);m.moon.position.copy(m.planetObj.planet.position).add(local);}
function updateMoonRing(m){const pts=[];for(let kk=0;kk<=120;kk++){const local=tiltedOrbitPoint(m.moonR,m.moonIncl,(kk/120)*Math.PI*2);pts.push(m.planetObj.planet.position.clone().add(local));}m.moonRing.geometry.dispose();m.moonRing.geometry=new THREE.BufferGeometry().setFromPoints(pts);}

// ── Panel-row → scene highlight ──
let panelHovered=null; // the moonObj currently highlighted from the panel list

function openPanel(c, moons, planetMoonObjs){
  document.getElementById('pc').textContent=c.code||'';
  document.getElementById('pn').textContent=c.name||'';
  document.getElementById('pct').textContent=c.cat||'';
  document.getElementById('pi').textContent=c.inst||'';
  document.getElementById('pd').textContent=c.desc||'';
  const titleEl=document.getElementById('pmoons-title');
  const listEl=document.getElementById('pmoons');
  if(moons&&moons.length){
    titleEl.textContent='Courses in this group';
    listEl.innerHTML=moons.map((m,i)=>`<div class="pmoon-item" data-idx="${i}"><div class="pmoon-dot" style="background:#${m.col.toString(16).padStart(6,'0')}"></div><div><div class="pmoon-code">${m.code}</div>${m.name}</div></div>`).join('');
    // delegated hover + click on the list
    listEl.onmouseenter=null;listEl.onmouseleave=null;listEl.onclick=null;
    listEl.addEventListener('mouseover',e=>{
      const row=e.target.closest('.pmoon-item');
      if(!row)return;
      const idx=parseInt(row.dataset.idx);
      panelHovered=planetMoonObjs?planetMoonObjs[idx]||null:null;
    });
    listEl.addEventListener('mouseleave',()=>{panelHovered=null;});
    listEl.addEventListener('click',e=>{
      const row=e.target.closest('.pmoon-item');
      if(!row)return;
      const idx=parseInt(row.dataset.idx);
      const mObj=planetMoonObjs?planetMoonObjs[idx]:null;
      if(mObj)setMoonFocus(mObj);
    });
  }else{titleEl.textContent='';listEl.innerHTML='';panelHovered=null;}
  document.getElementById('panel').classList.add('open');
}
function closePanel(){document.getElementById('panel').classList.remove('open');panelHovered=null;}
function setBack(v){document.getElementById('backBtn').classList.toggle('show',!!v);}

function setPlanetFocus(p){
  focusPlanet=p;focusMoon=null;
  const pos=p.planet.position.clone();const rel=cam.position.clone().sub(pos);
  ctrl.flyTo(11,Math.acos(rel.y/Math.max(1e-6,rel.length())),Math.atan2(rel.x,rel.z),0.9,pos);
  setBack(true);
  // Gather moonObjs for this planet in course order
  const pMoonObjs=moonObjs.filter(m=>m.planetObj===p);
  openPanel(planetMap.get(p.planet),grps[p.dept.cat]||[],pMoonObjs);
}
function setMoonFocus(m){focusPlanet=m.planetObj;focusMoon=m;const pos=m.moon.position.clone();const rel=cam.position.clone().sub(pos);ctrl.flyTo(5.2,Math.acos(rel.y/Math.max(1e-6,rel.length())),Math.atan2(rel.x,rel.z),0.9,pos);setBack(true);openPanel(moonMap.get(m.moon));}
function handleBack(){if(focusMoon){const parent=focusMoon.planetObj;focusMoon=null;setPlanetFocus(parent);}else if(focusPlanet){focusPlanet=null;closePanel();setBack(false);ctrl.reset(0.9);}}
window.handleBack=handleBack;

// ── INTERACTION ──
const ray=new THREE.Raycaster(),mouse=new THREE.Vector2();let hovered=null;
const tip=document.getElementById('tip');
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  ray.setFromCamera(mouse,cam);
  const hits=ray.intersectObjects(allPicks);
  if(hits.length){
    hovered=hits[0].object;
    const c=moonMap.get(hovered)||planetMap.get(hovered);
    if(c){document.getElementById('tc').textContent=c.code||'';document.getElementById('tn').textContent=c.name||'';document.getElementById('tcat').textContent=(c.cat||'')+(c.inst?' · '+c.inst:'');tip.style.left=(e.clientX+16)+'px';tip.style.top=(e.clientY-8)+'px';tip.style.opacity='1';}
    canvas.style.cursor='pointer';
  }else{hovered=null;tip.style.opacity='0';canvas.style.cursor='grab';}
});
canvas.addEventListener('click',()=>{
  ray.setFromCamera(mouse,cam);
  const hits=ray.intersectObjects(allPicks);
  if(!hits.length)return;
  const obj=hits[0].object;
  const m=moonObjs.find(mm=>mm.moon===obj);
  if(m){setMoonFocus(m);return;}
  const p=planetObjs.find(pp=>pp.planet===obj);
  if(p)setPlanetFocus(p);
});

// ── LEGEND ──
let legendHovered=null; // planetObj currently highlighted from legend
document.getElementById('leg').innerHTML=
  `<div style="font-family:'Orbitron',sans-serif;font-size:0.34rem;letter-spacing:3px;color:rgba(255,107,0,1);text-transform:uppercase;margin-bottom:5px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.08)">Disciplines</div>`+
  Object.entries(CAT_CSS).map(([k,v])=>`<div class="li" data-cat="${k}"><div class="ld" style="background:${v};box-shadow:0 0 5px ${v}"></div>${k}</div>`).join('');
const legListEl=document.getElementById('leg');
legListEl.addEventListener('mouseover',e=>{
  const row=e.target.closest('.li[data-cat]');
  legendHovered=row?planetObjs.find(p=>p.dept.cat===row.dataset.cat)||null:null;
});
legListEl.addEventListener('mouseleave',()=>{legendHovered=null;});
legListEl.addEventListener('click',e=>{
  const row=e.target.closest('.li[data-cat]');
  if(!row)return;
  const p=planetObjs.find(pp=>pp.dept.cat===row.dataset.cat);
  if(p)setPlanetFocus(p);
});

// ── RENDER LOOP ──
const legEl=document.getElementById('leg');
const hudZoomEl=document.getElementById('hudZoom');
let legVisible=false;
let hudZoomVisible=true;
let t=0;
function loop(){
  requestAnimationFrame(loop);
  t+=0.006;
  ctrl.update();
  sunMesh.rotation.y+=0.0015;
  coronaGroup.rotation.y+=0.001;
  sunPt.intensity=9+Math.sin(t*0.35)*1.2;
  dust3a.update();dust3b.update();dust3c.update();dust3cW.update();dust3d.update();
  planetObjs.forEach(p=>{p.anomaly+=p.speed;p.placePlanet();const isH=p.planet===hovered||p===legendHovered;p.orbitMat.opacity+=((isH?0.5:0.17)-p.orbitMat.opacity)*0.12;p.planet.scale.setScalar(isH?1.22:1.0);});
  moonObjs.forEach(m=>{
    m.anomaly+=m.speed;updateMoonWorld(m);updateMoonRing(m);
    const isH=m.moon===hovered||m===panelHovered;
    m.mMat.emissiveIntensity=isH?1.0+Math.sin(t*5+m.phase)*0.12:0.38+Math.sin(t+m.phase)*0.07;
    m.moon.scale.setScalar(isH?1.8:1.0);
    m.moonRing.material.opacity+=((isH?0.5:0.21)-m.moonRing.material.opacity)*0.12;
  });
  if(focusMoon)ctrl.setTarget(focusMoon.moon.position.clone());
  else if(focusPlanet)ctrl.setTarget(focusPlanet.planet.position.clone());
  // Legend: show only when zoomed out (r > 85)
  const nowVisible=ctrl.getR()>15;
  if(nowVisible!==legVisible){legVisible=nowVisible;legEl.style.opacity=nowVisible?'1':'0';legEl.style.pointerEvents=nowVisible?'auto':'none';}
  const zoomVisible=!(focusPlanet||focusMoon);
  if(zoomVisible!==hudZoomVisible){hudZoomVisible=zoomVisible;hudZoomEl.classList.toggle('hidden',!zoomVisible);}
  renderer.render(scene,cam);
}
loop();
</script>
