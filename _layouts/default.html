---
layout: compress
---
{% include base_path %}
<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
  </head>
  <body>
    {% include browser-upgrade.html %}
    {% include masthead.html %}
    <script>
  // Force masthead transparent before any CSS animation runs
  document.addEventListener('DOMContentLoaded', function() {
    const m = document.querySelector('.masthead');
    if (m) {
      m.style.setProperty('background', 'transparent', 'important');
      m.style.setProperty('background-color', 'transparent', 'important');
      m.style.setProperty('animation', 'none', 'important');
      m.style.setProperty('-webkit-animation', 'none', 'important');
    }
  });
</script>
    {{ content }}
    <div class="page__footer">
      <footer>
        {% include footer.html %}
      </footer>
    </div>
    {% include scripts.html %}
    
    <!-- Space background -->
    <script src="{{ '/assets/js/space-bg.js' | relative_url }}"></script>
  </body>
</html>
